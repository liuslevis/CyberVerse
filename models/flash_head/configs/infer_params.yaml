# For Lite checkpoints, VAE temporal stride is 8, so (frame_num - 1) must be a multiple of 8.
# 33 is the upstream default and keeps audio/video alignment valid.
frame_num: 33 # 合法的 frame_num 值：9, 17, 25, 33(默认), ...                       
motion_frames_latent_num: 2
tgt_fps: 24
sample_rate: 16000
sample_shift: 5
color_correction_strength: 1.0
cached_audio_duration: 8
num_heads: 12
height: 512
width: 512
