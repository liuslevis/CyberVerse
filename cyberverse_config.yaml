server:
    host: "0.0.0.0"
    http_port: 8080
    grpc_port: 50051
    cors_origins: ["*"]
livekit:
    url: "${LIVEKIT_URL}"
    api_key: "${LIVEKIT_API_KEY}"
    api_secret: "${LIVEKIT_API_SECRET}"
# Warmup configuration for reducing first frame inference latency
warmup:
    enabled: true
    distributed:
        enabled: true # Enable warmup in multi-GPU mode
        timeout_s: 30 # Timeout in seconds to prevent hangs
inference:
    avatar:
        default: "flash_head"
        runtime:
            cuda_visible_devices: 0
            world_size: 1
        flash_head:
            plugin_class: "inference.plugins.avatar.flash_head_plugin.FlashHeadAvatarPlugin"
            models_dir: "models"
            checkpoint_dir: "/root/autodl-tmp/models/SoulX-FlashHead-1_3B"
            wav2vec_dir: "/root/autodl-tmp/models/wav2vec2-base-960h"
            model_type: "pro"
            device: "cuda:0"
            seed: 9999
            compile_model: true
            compile_vae: true
            dist_worker_main_thread: true
            infer_params:
                frame_num: 33 
                motion_frames_latent_num: 2
                tgt_fps: 20
                sample_rate: 16000
                sample_shift: 5
                color_correction_strength: 1.0
                cached_audio_duration: 8
                num_heads: 12
                height: 512
                width: 512
        live_act:
            plugin_class: "inference.plugins.avatar.live_act_plugin.LiveActAvatarPlugin"
            models_dir: "models/SoulX-LiveAct"
            ckpt_dir: "/root/autodl-tmp/models/LiveAct"
            wav2vec_dir: "/root/autodl-tmp/models/chinese-wav2vec2-base"
            seed: 42
            t5_cpu: false
            fp8_kv_cache: false
            offload_cache: false
            block_offload: false
            mean_memory: false
            compile_wan_model: false
            compile_vae_decode: false
            dist_worker_main_thread: true
            default_prompt: "一个人在说话"
            infer_params:
                size: "320*480"
                fps: 20
                audio_cfg: 1.0

    voice_llm:
        default: "doubao"
        doubao:
            plugin_class: "inference.plugins.voice_llm.doubao_realtime.DoubaoRealtimePlugin"
            access_token: "${DOUBAO_ACCESS_TOKEN}"
            app_id: "${DOUBAO_APP_ID}"
            # 参考 skill 文档与 code-example：示例所用域名，否则在当前环境会出现 DNS 解析失败
            ws_url: "wss://openspeech.bytedance.com/api/v3/realtime/dialogue"
            voice_type: "zh_female_default"
            system_prompt: "你是一个友善的数字人助手。"
            # Avoid DialogAudioIdleTimeoutError before FlashHead's first chunk arrives.
            end_smooth_window_ms: 6000
    llm:
        default: "openai"
        openai:
            plugin_class: "inference.plugins.llm.openai_plugin.OpenAILLMPlugin"
            api_key: "${OPENAI_API_KEY}"
            model: "gpt-4o"
            temperature: 0.7
            system_prompt: "你是一个友善的数字人助手。"
    tts:
        default: "openai"
        openai:
            plugin_class: "inference.plugins.tts.openai_tts_plugin.OpenAITTSPlugin"
            api_key: "${OPENAI_API_KEY}"
            model: "tts-1"
            voice: "nova"
    asr:
        default: "whisper"
        whisper:
            plugin_class: "inference.plugins.asr.whisper_plugin.WhisperASRPlugin"
            model_size: "base"
            language: "auto"
            device: "cpu"
session:
    max_concurrent: 4
    idle_timeout_s: 300
    max_duration_s: 3600
pipeline:
    default_mode: "voice_llm"
    streaming_mode: "direct" # "direct" = P2P WebRTC (pion), "livekit" = LiveKit SFU
    turn_enabled: true
    turn_port: 8443 # TCP port for embedded TURN server (SSH tunnel)
    turn_realm: "cyberverse"
    turn_username: "cyberverse"
    turn_password: "${TURN_PASSWORD}"
    ice_public_ip: "" # Set real public IP/domain when needed; empty defaults to 127.0.0.1
recording:
    enabled: true # 设为 true 开启录制
    output_dir: "./recordings"
    crf: 23
inference_grpc:
    addr: "localhost:50051"
