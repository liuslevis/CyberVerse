server:
    host: "0.0.0.0"
    http_port: 8080
    grpc_port: 50051
    cors_origins: ["*"]
livekit:
    url: "${LIVEKIT_URL}"
    api_key: "${LIVEKIT_API_KEY}"
    api_secret: "${LIVEKIT_API_SECRET}"
# Warmup configuration for reducing first frame inference latency
warmup:
    enabled: true
    distributed:
        enabled: true # Enable warmup in multi-GPU mode
        timeout_s: 30 # Timeout in seconds to prevent hangs
inference:
    avatar:
        # Use a lightweight placeholder avatar by default so the stack can run
        # without downloading large model weights.
        default: "flash_head"
        runtime:
            cuda_visible_devices: 0
            world_size: 1
        static:
            plugin_class: "inference.plugins.avatar.static_plugin.StaticAvatarPlugin"
            fps: 25
            width: 512
            height: 512
            bg_color: [128, 128, 128]
        flash_head:
            plugin_class: "inference.plugins.avatar.flash_head_plugin.FlashHeadAvatarPlugin"
            models_dir: "models"
            checkpoint_dir: "./checkpoints/SoulX-FlashHead-1_3B"
            wav2vec_dir: "./checkpoints/wav2vec2-base-960h"
            model_type: "lite"
            device: "cuda:0"
            seed: 9999
        live_act:
            plugin_class: "inference.plugins.avatar.live_act_plugin.LiveActAvatarPlugin"
            models_dir: "models/SoulX-LiveAct"
            ckpt_dir: "./checkpoints/LiveAct"
            wav2vec_dir: "./checkpoints/chinese-wav2vec2-base"
            size: "320*480"
            fps: 20
            seed: 42
            audio_cfg: 1.0
            t5_cpu: false
            fp8_kv_cache: false
            offload_cache: false
            block_offload: false
            mean_memory: false
            compile_wan_model: false
            compile_vae_decode: false
            default_prompt: "一个人在说话"

    voice_llm:
        default: "doubao"
        doubao:
            plugin_class: "inference.plugins.voice_llm.doubao_realtime.DoubaoRealtimePlugin"
            access_token: "${DOUBAO_ACCESS_TOKEN}"
            app_id: "${DOUBAO_APP_ID}"
            # 参考 skill 文档与 code-example：示例所用域名，否则在当前环境会出现 DNS 解析失败
            ws_url: "wss://openspeech.bytedance.com/api/v3/realtime/dialogue"
            voice_type: "温柔文雅"
            system_prompt: "你是一个友善的数字人助手。"
            # Avoid DialogAudioIdleTimeoutError before FlashHead's first chunk arrives.
            end_smooth_window_ms: 6000
    llm:
        default: "qwen"
        qwen:
            plugin_class: "inference.plugins.llm.qwen_plugin.QwenLLMPlugin"
            api_key: "${QWEN_API_KEY}"
            base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
            model: "qwen-plus"
            temperature: 0.7
            system_prompt: "你是一个友善的数字人助手。"
        openai:
            plugin_class: "inference.plugins.llm.openai_plugin.OpenAILLMPlugin"
            api_key: "${OPENAI_API_KEY}"
            model: "gpt-4o"
            temperature: 0.7
            system_prompt: "你是一个友善的数字人助手。"
    tts:
        default: "qwen"
        qwen:
            plugin_class: "inference.plugins.tts.qwen_tts_plugin.QwenTTSPlugin"
            api_key: "${QWEN_API_KEY}"
            base_url: "https://dashscope.aliyuncs.com/api/v1"
            model: "qwen3-tts-flash"
            voice: "Cherry"
            language_type: "auto"
        openai:
            plugin_class: "inference.plugins.tts.openai_tts_plugin.OpenAITTSPlugin"
            api_key: "${OPENAI_API_KEY}"
            model: "tts-1"
            voice: "nova"
    asr:
        default: "whisper"
        whisper:
            plugin_class: "inference.plugins.asr.whisper_plugin.WhisperASRPlugin"
            model_size: "base"
            language: "auto"
            device: "cpu"
session:
    max_concurrent: 4
    idle_timeout_s: 300
    max_duration_s: 3600
pipeline:
    default_mode: "voice_llm"
    streaming_mode: "direct" # "direct" = P2P WebRTC (pion), "livekit" = LiveKit SFU
    turn_enabled: true
    turn_port: 8443 # TCP port for embedded TURN server (SSH tunnel)
    turn_realm: "cyberverse"
    turn_username: "cyberverse"
    turn_password: "${TURN_PASSWORD}"
    ice_public_ip: "148.135.46.242" # Server public IP for TURN relay advertisement
recording:
    enabled: true # 设为 true 开启录制
    output_dir: "./recordings"
    crf: 23
inference_grpc:
    addr: "localhost:50051"
